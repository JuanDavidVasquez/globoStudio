<head>

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Globo Studio - Transformando Eventos con Arte en Globo">

    <!-- Title -->
    <title>Globo Studio - Decoraciones Artísticas con Globo para Eventos</title>

    <!-- Stylesheets and Scripts -->
    <link rel="stylesheet" href="./assets/css/register.css">
    <link rel="icon" href="./assets/img/logoPNG.png" type="image/x-icon">
    <link rel="canonical" href="http://globosstudios.com.co/">
    <script src="./assets/js/app.js" defer></script>
</head>
<body>
    <header class="mainHead">
        <nav>
            <h1 id="logo">
                <img src="./assets/img/logoPNG.png" alt="Globo Studio Logo">
                Globo Studio
            </h1>
            <ul class="navLinks">
                <li><a href="index.html">Home</a></li>
            </ul>
            <div class="burger">
                <span class="line1"></span>
                <span class="line2"></span>
                <span class="line3"></span>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="formContainer">
            <h1>Registrate ya!!</h1>
            <form action="#" method="post">
                <div class="inputGroup">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="inputGroup">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="inputGroup">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="inputGroup">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit">Registrar</button>
            </form>
        </div>
    </div>
    <footer>
        <h4>Juan Vasquez &copy; 2024</h4>
        <ul>
            <li><a href="#"><img src="./assets/img/youtube-symbol 1.svg" alt=""></a></li>

            <li><a href="#"><img src="./assets/img/twitter 1.svg" alt=""></a></li>
        </ul>
    </footer>
